# Laravel 11 — Compliance checklist (evaluator Docker stack)
# Usage: docker compose up -d --build
#
# Profiles:
#   (default)  nginx + php-fpm (app) + mysql + queue worker
#   vite       Vite dev server (HMR) — docker compose --profile vite up -d

services:
  mysql:
    image: mysql:8.0
    container_name: checklist-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_secret
      MYSQL_ROOT_PASSWORD: root_secret
    # Host port default 3307 — avoids conflict with a local MySQL on 3306
    ports:
      - "${DOCKER_MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - checklist
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 35
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: checklist-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - checklist

  nginx:
    image: nginx:1.27-alpine
    container_name: checklist-nginx
    restart: unless-stopped
    ports:
      - "${DOCKER_WEB_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - checklist

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: checklist-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command:
      - php
      - artisan
      - queue:work
      - database
      - --sleep=3
      - --tries=3
      - --max-time=3600
      - --verbose
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - checklist

  vite:
    image: node:20-bookworm-slim
    container_name: checklist-vite
    profiles:
      - vite
    working_dir: /var/www/html
    ports:
      - "${DOCKER_VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
    environment:
      DOCKER_VITE: "1"
      VITE_APP_NAME: "${VITE_APP_NAME:-Compliance Management System}"
    command: sh -c "npm install && npm run dev"
    networks:
      - checklist

volumes:
  mysql-data:
    driver: local

networks:
  checklist:
    driver: bridge
