; Local / Docker tuning (do not enable in hardened production blindly)
expose_php = Off
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
; Local dev / Docker — revalidate on change (set 0 only in hardened prod OPCache)
opcache.validate_timestamps = 1
